################################################################################
# /etc/default/cert-node
# SSL 证书自动分发系统 - Node 节点敏感配置（多域名版）
# 权限建议: chmod 600 /etc/default/cert-node
#           chown root:root /etc/default/cert-node
################################################################################

# ── 多域名配置（Bash 数组）────────────────────────────────────────────────────
# 与 Master 端保持一致，Node 将依次拉取并部署每个域名的证书
DOMAINS=(
    "example.com"
    "another-site.org"
)

# ── OpenList / WebDAV 下载源 ─────────────────────────────────────────────────
# 与 Master 上传时的 WEBDAV_URL 保持一致
# 注意: URL 末尾不要带斜杠！
WEBDAV_URL="https://openlist.example.com/dav/ssl"

# WebDAV 只读账户（建议创建专用只读用户）
WEBDAV_AUTH="readonly_user:readonly_password"

# ── 本地证书部署根目录 ────────────────────────────────────────────────────────
# 每个域名对应子目录: ${CERT_BASE_DIR}/<domain>/
#   <domain>.key   (600)
#   <domain>.cer   (644)
#   cert.sha256    (644)
# 注意: 末尾不要带斜杠！
# 常用路径示例:
#   /etc/ssl/certs/acme   (通用，推荐)
#   /etc/nginx/ssl        (Nginx 习惯路径)
CERT_BASE_DIR="/etc/ssl/certs/acme"

# 证书下载临时根目录
TMP_BASE="/tmp/ssl_update"

# ── Telegram 通知 ─────────────────────────────────────────────────────────────
TG_BOT_TOKEN="123456789:AABBccDDeeFFggHHiiJJkkLLmmNNoo"
TG_CHAT_ID="your_chat_id"

# ── 服务重载命令 ───────────────────────────────────────────────────────────────
# 所有域名证书部署完成后，统一执行一次重载（避免多次 reload 抖动）
SERVICE_TEST_CMD="nginx -t"
SERVICE_RELOAD_CMD="systemctl reload nginx"

# 操作日志
LOG_FILE="/var/log/cert-node-pull.log"

# 节点标识（TG 消息中用于区分不同 VPS）
NODE_NAME="$(hostname -s)"
