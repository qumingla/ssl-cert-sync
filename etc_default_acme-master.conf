################################################################################
# /etc/default/acme-master
# SSL 证书自动分发系统 - Master 节点敏感配置（多域名版）
# 权限建议: chmod 600 /etc/default/acme-master
#           chown root:root /etc/default/acme-master
################################################################################

# ── 多域名配置（Bash 数组）────────────────────────────────────────────────────
# 每个元素为一个主域名，脚本将自动申请 *.DOMAIN + DOMAIN 通配符证书
# 示例: DOMAINS=("example.com" "another-site.org" "api.myapp.io")
DOMAINS=(
    "example.com"
    "another-site.org"
)

# ── Cloudflare DNS API 凭证 ──────────────────────────────────────────────────
# acme.sh 支持两种鉴权方式，二选一填写即可（优先使用 CF_Token）
#
# 方式 A【推荐】: Cloudflare 作用域 API Token
#   前往 https://dash.cloudflare.com/profile/api-tokens
#   创建 Token → 模板选「Edit zone DNS」→ 限定到对应域名的 Zone
#   acme.sh 检测到 CF_Token 时自动使用此方式
CF_Token="your_cloudflare_api_token_here"

# 方式 B【旧版】: Cloudflare 全局 API Key（不推荐，权限过大）
#   前往 https://dash.cloudflare.com/profile/api-tokens → 「Global API Key」
#   注意: 若使用 CF_Token，下面两行可留空
CF_Key=""
CF_Email=""

# ── Telegram 通知 ────────────────────────────────────────────────────────────
TG_BOT_TOKEN="123456789:AABBccDDeeFFggHHiiJJkkLLmmNNoo"
TG_CHAT_ID="your_chat_id"

# ── OpenList / WebDAV 上传配置 ───────────────────────────────────────────────
# WebDAV 基础 URL（末尾不带斜杠）
# 每个域名将上传至: ${WEBDAV_URL}/<domain>/{<domain>.key,<domain>.cer,<domain>.sha256}
# 注意: URL 末尾不要带斜杠！带了会导致上传路径双斜杠错误
WEBDAV_URL="https://openlist.example.com/dav/ssl"

# WebDAV 认证（Basic Auth: user:password）
WEBDAV_AUTH="webdav_user:webdav_password"

# ── 本地路径 ──────────────────────────────────────────────────────────────────
# acme.sh 主目录（默认安装路径）
ACME_HOME="/root/.acme.sh"

# 证书临时暂存根目录（每个域名在此目录下建立子目录）
STAGING_BASE="/tmp/acme_staging"

# 操作日志文件
LOG_FILE="/var/log/cert-master-sync.log"

# ── 强制重新申请选项 ──────────────────────────────────────────────────────────
# 切换 CA 后（如从 ZeroSSL 切到 Let's Encrypt）旧的待处理订单需要 --force 重新启动
# 设为 1 则强制所有域名重新申请；完成后将此项删除或注释掉以恢复正常模式
# FORCE_REISSUE="1"
