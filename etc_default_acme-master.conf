################################################################################
# /etc/default/acme-master
# SSL 证书自动分发系统 - Master 节点敏感配置（多域名 · 多供应商版）
# 权限建议: chmod 600 /etc/default/acme-master
#           chown root:root /etc/default/acme-master
################################################################################

# ── 多域名配置（Bash 数组）────────────────────────────────────────────────────
# 每个元素为一个主域名，脚本将自动申请 *.DOMAIN + DOMAIN 通配符证书
DOMAINS=(
    "example.com"
    "another-site.org"
)

# ── DNS 供应商配置 ────────────────────────────────────────────────────────────
# 全局默认 DNS 插件（所有域名使用此插件，除非在 DOMAIN_DNS_PROVIDER 中单独覆盖）
# 常用插件名:
#   dns_cf        → Cloudflare
#   dns_ali       → 阿里云 DNS
#   dns_tencent   → 腾讯云 DNSPod（推荐）
#   dns_dp        → DNSPod 国内（旧版 API）
#   dns_huaweicloud → 华为云
#   dns_gd        → GoDaddy
#   更多插件: https://github.com/acmesh-official/acme.sh/wiki/dnsapi
DNS_PROVIDER="dns_cf"

# 可选：按域名单独指定 DNS 插件（优先级高于 DNS_PROVIDER）
# 适合"不同域名在不同注册商"的场景，不需要时注释掉整个 declare 块即可
# declare -A DOMAIN_DNS_PROVIDER=(
#     ["aliyun-domain.com"]="dns_ali"
#     ["tencent-domain.com"]="dns_tencent"
#     ["cf-domain.com"]="dns_cf"
# )

# ── Cloudflare 凭证 (dns_cf) ──────────────────────────────────────────────────
# 方式 A【推荐】: 作用域 API Token（前往 https://dash.cloudflare.com/profile/api-tokens）
CF_Token="your_cloudflare_api_token_here"

# 方式 B【旧版】: 全局 API Key（不推荐，权限过大）
# 若使用 CF_Token，下面两行留空即可
CF_Key=""
CF_Email=""

# ── 阿里云 DNS 凭证 (dns_ali) ─────────────────────────────────────────────────
# AccessKey 管理: https://ram.console.aliyun.com/manage/ak
# 建议创建 RAM 子账号并仅授予 AliyunDNSFullAccess 权限
# Ali_Key="your_aliyun_access_key_id"
# Ali_Secret="your_aliyun_access_key_secret"

# ── 腾讯云 DNSPod 凭证 (dns_tencent) ─────────────────────────────────────────
# API 密钥管理: https://console.cloud.tencent.com/cam/capi
# 建议创建子账号并仅授予 QcloudDNSPodFullAccess 策略
# Tencent_SecretId="your_tencent_secret_id"
# Tencent_SecretKey="your_tencent_secret_key"

# ── DNSPod 国内旧版 API 凭证 (dns_dp) ────────────────────────────────────────
# 适合使用 id+token 的旧版 DNSPod 账号
# 控制台: https://console.dnspod.cn/account/token/apikey
# DP_Id="your_dnspod_id"
# DP_Key="your_dnspod_api_key"

# ── 华为云 DNS 凭证 (dns_huaweicloud) ────────────────────────────────────────
# IAM 控制台: https://console.huaweicloud.com/iam/
# 建议仅授予 DNS FullAccess 权限
# HUAWEICLOUD_USERNAME="your_iam_username"
# HUAWEICLOUD_PASSWORD="your_iam_password"
# HUAWEICLOUD_DOMAIN_NAME="your_account_name"

# ── GoDaddy 凭证 (dns_gd) ────────────────────────────────────────────────────
# API 密钥: https://developer.godaddy.com/keys
# GD_Key="your_godaddy_api_key"
# GD_Secret="your_godaddy_api_secret"

# ── 其他供应商 ────────────────────────────────────────────────────────────────
# acme.sh 支持 150+ DNS 供应商，在 DNS_PROVIDER 填入对应插件名，
# 并在此处声明该插件所需的环境变量即可。
# 参考: https://github.com/acmesh-official/acme.sh/wiki/dnsapi

# ── Telegram 通知 ────────────────────────────────────────────────────────────
TG_BOT_TOKEN="123456789:AABBccDDeeFFggHHiiJJkkLLmmNNoo"
TG_CHAT_ID="your_chat_id"

# ── OpenList / WebDAV 上传配置 ───────────────────────────────────────────────
# WebDAV 基础 URL（末尾不带斜杠）
# 每个域名将上传至: ${WEBDAV_URL}/<domain>/{<domain>.key,<domain>.cer,<domain>.sha256}
WEBDAV_URL="https://openlist.example.com/dav/ssl"

# WebDAV 认证（Basic Auth: user:password）
WEBDAV_AUTH="webdav_user:webdav_password"

# ── 本地路径 ──────────────────────────────────────────────────────────────────
ACME_HOME="/root/.acme.sh"
STAGING_BASE="/tmp/acme_staging"
LOG_FILE="/var/log/cert-master-sync.log"

# ── 续签策略 ──────────────────────────────────────────────────────────────────
# 证书剩余天数 ≤ 该值时才触发续签（防止频繁调用 Let's Encrypt API）
# RENEW_DAYS_BEFORE=7

# ── 强制重新申请（切换 CA 后使用，完成后注释掉）──────────────────────────────
# FORCE_REISSUE="1"
