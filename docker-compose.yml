services:
  ssl-sync-master:
    build:
      context: .
      dockerfile: web/backend/Dockerfile
    container_name: ssl-sync-master
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SSL_SYNC_SECRET_KEY: "${SSL_SYNC_SECRET_KEY:-change-me-before-production}"
      SSL_SYNC_ADMIN_USERNAME: "${SSL_SYNC_ADMIN_USERNAME:-admin}"
      SSL_SYNC_ADMIN_PASSWORD: "${SSL_SYNC_ADMIN_PASSWORD:-admin}"
      SSL_SYNC_ENABLE_SCRIPT_EXEC: "${SSL_SYNC_ENABLE_SCRIPT_EXEC:-0}"
    volumes:
      - ./data:/var/lib/ssl-cert-sync
      - ./logs:/var/log/ssl-cert-sync
      - ./config:/etc/ssl-cert-sync
      - ${HOME}/.acme.sh:/root/.acme.sh
